# Nginx 配置 — 反向代理 Astro SSR 服务器
# 放到 /etc/nginx/conf.d/my-blog.conf

server {
    listen 80;
    server_name 106.14.22.212;  # 如有域名改为你的域名

    # 上传文件大小限制
    client_max_body_size 10M;

    # 日志
    access_log /var/log/nginx/my-blog-access.log;
    error_log  /var/log/nginx/my-blog-error.log;

    # 静态资源（直接由 Nginx 提供，不经过 Node）
    location /_astro/ {
        alias /opt/my-blog/dist/client/_astro/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # 上传的文件
    location /uploads/ {
        alias /opt/my-blog/public/uploads/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Favicon & robots
    location = /favicon.svg {
        alias /opt/my-blog/dist/client/favicon.svg;
        expires 1d;
    }

    location = /robots.txt {
        alias /opt/my-blog/dist/client/robots.txt;
        expires 1d;
    }

    # 其他所有请求 → Node.js 服务器
    location / {
        proxy_pass http://127.0.0.1:4321;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
