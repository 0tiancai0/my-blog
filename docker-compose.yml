version: '3.8'

services:
  # ==================== Nginx 反向代理 ====================
  nginx:
    image: nginx:alpine
    container_name: blog-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx-docker.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/usr/share/nginx/html/uploads:ro
    depends_on:
      astro:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - blog-network

  # ==================== Astro SSR 博客前端 ====================
  astro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blog-astro
    environment:
      - PORT=4321
      - HOST=0.0.0.0
      - NODE_ENV=production
      - SITE_URL=${SITE_URL:-http://localhost}
      - PUBLIC_API_URL=
      - TINA_CLIENT_ID=${TINA_CLIENT_ID:-}
      - TINA_TOKEN=${TINA_TOKEN:-}
      - TINA_SEARCH_TOKEN=${TINA_SEARCH_TOKEN:-}
      - UPSTASH_REDIS_REST_URL=${UPSTASH_REDIS_REST_URL:-}
      - UPSTASH_REDIS_REST_TOKEN=${UPSTASH_REDIS_REST_TOKEN:-}
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4321/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ==================== Fastify API 服务 ====================
  api:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: blog-api
    environment:
      - PORT=3456
      - NODE_ENV=production
      - ADMIN_TOKEN=${ADMIN_TOKEN:-admin-secret-change-me}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost}
    volumes:
      - db_data:/app/data
    restart: unless-stopped
    networks:
      - blog-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3456/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  uploads_data:
    driver: local
  db_data:
    driver: local

networks:
  blog-network:
    driver: bridge
